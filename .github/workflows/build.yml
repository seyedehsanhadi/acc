name: build

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # build.sh runs check-syntax.sh (bash -n on every *.sh) first, then packages the
      # flashable zip + tarball and regenerates the flashable uninstaller zip. Pure shell:
      # needs zip/tar/gzip/sed/find, all present on ubuntu-latest. No JDK/SDK required.
      - name: Build flashable zip + tarball
        run: |
          chmod +x build.sh check-syntax.sh 2>/dev/null || true
          # force a fresh uninstaller zip from the current uninstall.sh (git checkout equalizes mtimes,
          # so build.sh's "-ot" staleness check would otherwise skip regenerating it on CI)
          rm -f bin/acc_flashable_uninstaller.zip
          sh build.sh

      - name: Show outputs
        run: ls -R _builds bin 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: acc-flashable-zip
          path: |
            _builds/**/*.zip
            _builds/**/*.tgz
            bin/acc_flashable_uninstaller.zip

      # Publish a single rolling pre-release (reuses the "rc3" tag, not a new tag each push)
      # so the flashable zip is downloadable from the Releases page.
      - name: Publish rolling pre-release
        if: github.ref == 'refs/heads/6.4-rc2-wip'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Refresh the rolling pre-release on the fixed rc3 tag. Delete the release first
          # (keep the tag, so no tag-recreation race) to clear any stale/phantom assets left
          # by earlier failed uploads, then recreate it with the current build outputs.
          # --clobber proved unreliable: a half-finished upload leaves an asset in GitHub's
          # "starter" state that clobber's dedup won't delete, so re-upload hits HTTP 422.
          gh release delete rc3 --yes 2>/dev/null || true
          assets=""; for f in _builds/*/*.zip _builds/*/*.tgz bin/acc_flashable_uninstaller.zip; do [ -f "$f" ] && assets="$assets $f"; done
          gh release create rc3 $assets --prerelease --target "$GITHUB_SHA" \
            --title "ACC v2025.5.18-6.4-rc3 (pre-release)" \
            --notes "Auto-built flashable module + tarball + uninstaller. KernelSU/APatch acc-on-PATH, clean uninstall; charging daemon unchanged from rc2."
